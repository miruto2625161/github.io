    <div class="contact-box">
       <h1>お問い合わせ</h1>

       <form id="contactForm">

         <input type="text" id="name" placeholder="お名前">

         <input type="email" id="email" placeholder="メールアドレス">

         <textarea id="message" placeholder="お問い合わせ内容"></textarea>

        <button type="submit">送信</button>

        <p id="result"></p>

        </form>
    </div>

    <p id="result"></p>

    <script src="contact.js"></script>

    <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1494541815058006027/eF_OwGp0EvZ2vPNA7yGoqmod1ftUuwoq6FgpLzCDE7pDmt9PewDCdoWa7lBPv19foVcW";

    document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    const data = {
    content: `名前: ${name}\ne-mail: ${email}\nメッセージ: ${message}`
    };

    await fetch(WEBHOOK_URL, {
     method: "POST",
     headers: {
      "Content-Type": "application/json"
     },
      body: JSON.stringify(data)
     });

     alert("送信されました");
     this.reset();
     });
   </script>
